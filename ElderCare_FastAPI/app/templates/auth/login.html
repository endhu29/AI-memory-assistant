<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ElderCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo"><i class="bi bi-heart-pulse-fill"></i></div>
    <h1 class="auth-title">ElderCare Assistant</h1>
    <p class="auth-subtitle">Sign in to continue</p>

    {% if request.query_params.get('registered') %}
    <div class="alert alert-success"><i class="bi bi-check-circle"></i> Account created! Please log in.</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Enter username" required autofocus/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:1rem">Sign In</button>
    </form>
    <p class="auth-link">New here? <a href="/register">Create account</a></p>
  </div>
</div>
</body>
</html>
